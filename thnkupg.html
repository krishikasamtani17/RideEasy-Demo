<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You — RideEasy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      border: 1px solid #e5e5e5;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 2rem;
    }
    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
    }

    .check-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #dcfce7;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 34px;
      animation: pop 0.4s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #111;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 14px;
      color: #777;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 0 0 1.5rem;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9f9f7;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 10px;
      text-align: left;
    }
    .info-icon { font-size: 18px; flex-shrink: 0; }
    .info-text { font-size: 13px; color: #555; line-height: 1.4; }
    .info-text strong { color: #111; display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 1px; }

    .btn-back {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 10px 28px;
      background: #111;
      color: #fff;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-back:hover { background: #333; }

    .footer-note {
      margin-top: 2rem;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo"><span class="logo-dot"></span> RideEasy</div>

  <div class="check-circle">✅</div>

  <h1>Thank you!</h1>
  <p>Your submission has been received.<br>Our team will get back to you within 24 hours.</p>

  <div class="divider"></div>

  <div class="info-row">
    <div class="info-icon">📞</div>
    <div class="info-text">
      <strong>Call us</strong>
      1800-XXX-XXXX (Mon–Sat, 9am–6pm)
    </div>
  </div>

  <div class="info-row">
    <div class="info-icon">✉️</div>
    <div class="info-text">
      <strong>Email us</strong>
      support@rideeasy.in
    </div>
  </div>

  <div class="info-row">
    <div class="info-icon">📍</div>
    <div class="info-text">
      <strong>Visit us</strong>
       Jaipur, Rajasthan
    </div>
  </div>

  <a href="index.html" class="btn-back">← Back to Home</a>

</div>

<div class="footer-note">© 2026 RideEasy. All rights reserved.</div>

</body>
</html>
